<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts — CRM360 SG</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="topbar"><a href="../index.html" class="topbar-brand"><div class="topbar-bars"><span></span><span></span><span></span><span></span><span></span></div>CRM360 SG</a><div class="topbar-search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" placeholder="Rechercher..." id="globalSearch"></div><div class="topbar-right"><div class="topbar-avatar">MC</div></div></header>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main fade-in" id="mainContent">
      <div class="page-header">
        <div><h1>Contacts</h1><div class="page-header-sub" id="pageSubtitle"></div></div>
      </div>
      <div class="table-card">
        <div class="table-toolbar"><div class="table-toolbar-left"><h3>Tous les contacts</h3><span class="table-count" id="count"></span></div></div>
        <table>
          <thead><tr><th>Nom</th><th>Fonction</th><th>Entreprise</th><th>Email</th><th>Téléphone</th><th>Statut</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="modal"><div class="modal"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="MickaCRM.ui.closeModal()">&times;</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/config.js"></script><script src="../js/ui.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      MickaCRM.nav.init('contacts');
      const D = MickaCRM.data.contacts;
      const { badge, avatar } = MickaCRM.ui;
      document.getElementById('pageSubtitle').textContent = D.length + ' contacts professionnels';
      document.getElementById('count').textContent = D.length;
      document.getElementById('tableBody').innerHTML = D.map((c, i) => `
        <tr onclick="showContact('${c.id}')">
          <td><div style="display:flex;align-items:center;gap:10px">${avatar(c.firstName + ' ' + c.lastName, i)}<div style="font-weight:600">${c.firstName} ${c.lastName}</div></div></td>
          <td>${c.title}</td>
          <td><a href="accounts.html" style="color:var(--blue-light);font-weight:500">${c.account}</a></td>
          <td style="font-size:12px">${c.email}</td>
          <td>${c.phone}</td>
          <td>${badge(c.status)}</td>
        </tr>
      `).join('');

      window.showContact = (id) => {
        const c = D.find(x => x.id === id); if (!c) return;
        MickaCRM.ui.openModal(c.firstName + ' ' + c.lastName, `
          <div class="form-row">
            <div class="detail-field"><div class="detail-field-label">Fonction</div><div class="detail-field-value">${c.title}</div></div>
            <div class="detail-field"><div class="detail-field-label">Entreprise</div><div class="detail-field-value">${c.account}</div></div>
          </div>
          <div class="form-row">
            <div class="detail-field"><div class="detail-field-label">Email</div><div class="detail-field-value">${c.email}</div></div>
            <div class="detail-field"><div class="detail-field-label">Téléphone</div><div class="detail-field-value">${c.phone}</div></div>
          </div>
          <div class="form-row">
            <div class="detail-field"><div class="detail-field-label">Ville</div><div class="detail-field-value">${c.city}</div></div>
            <div class="detail-field"><div class="detail-field-label">Statut</div><div class="detail-field-value">${badge(c.status)}</div></div>
          </div>
        `, '<button class="btn btn-secondary" onclick="MickaCRM.ui.closeModal()">Fermer</button>');
      };
    });
  </script>
</body>
</html>
