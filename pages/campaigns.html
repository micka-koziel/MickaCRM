<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campagnes — CRM360 SG</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="topbar"><a href="../index.html" class="topbar-brand"><div class="topbar-bars"><span></span><span></span><span></span><span></span><span></span></div>CRM360 SG</a><div class="topbar-search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" placeholder="Rechercher..." id="globalSearch"></div><div class="topbar-right"><div class="topbar-avatar">MC</div></div></header>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main fade-in" id="mainContent">
      <div class="page-header"><div><h1>Campagnes</h1><div class="page-header-sub" id="pageSubtitle"></div></div></div>
      <div class="kpi-row" id="campaignCards"></div>
      <div class="table-card fade-in fade-in-delay-3">
        <div class="table-toolbar"><div class="table-toolbar-left"><h3>Toutes les campagnes</h3><span class="table-count" id="count"></span></div></div>
        <table>
          <thead><tr><th>Campagne</th><th>Type</th><th>Canal</th><th>Budget</th><th>Leads</th><th>Coût/Lead</th><th>Dates</th><th>Statut</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="modal"><div class="modal"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="MickaCRM.ui.closeModal()">&times;</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/config.js"></script><script src="../js/ui.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      MickaCRM.nav.init('campaigns');
      const D = MickaCRM.data.campaigns;
      const { fmt, fmtDate, badge } = MickaCRM.ui;
      document.getElementById('pageSubtitle').textContent = D.length + ' campagnes marketing';
      document.getElementById('count').textContent = D.length;

      const colors = ['blue','teal','orange'];
      document.getElementById('campaignCards').innerHTML = D.map((c, i) => `
        <div class="kpi-card ${colors[i]} fade-in fade-in-delay-${i+1}">
          <div class="kpi-label">${c.type} • ${c.channel}</div>
          <div style="font-family:Outfit;font-size:17px;font-weight:700;margin-bottom:2px">${c.name}</div>
          <div style="display:flex;gap:20px;margin-top:10px">
            <div><div style="font-size:11px;color:var(--text-light)">Budget</div><div style="font-family:Outfit;font-weight:600">${fmt(c.budget)}</div></div>
            <div><div style="font-size:11px;color:var(--text-light)">Leads</div><div style="font-family:Outfit;font-weight:600">${c.leadsGenerated}</div></div>
            <div><div style="font-size:11px;color:var(--text-light)">Coût/Lead</div><div style="font-family:Outfit;font-weight:600">${c.costPerLead ? fmt(c.costPerLead) : '-'}</div></div>
          </div>
          <div style="margin-top:8px">${badge(c.status)}</div>
        </div>
      `).join('');

      document.getElementById('tableBody').innerHTML = D.map(c => `
        <tr>
          <td style="font-weight:600">${c.name}</td>
          <td>${c.type}</td>
          <td>${c.channel}</td>
          <td style="font-family:Outfit;font-weight:600">${fmt(c.budget)}</td>
          <td style="font-family:Outfit;font-weight:600">${c.leadsGenerated}</td>
          <td>${c.costPerLead ? fmt(c.costPerLead) : '-'}</td>
          <td style="font-size:12px">${fmtDate(c.startDate)} → ${fmtDate(c.endDate)}</td>
          <td>${badge(c.status)}</td>
        </tr>
      `).join('');
    });
  </script>
</body>
</html>
