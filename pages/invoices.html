<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factures — CRM360 SG</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="topbar"><a href="../index.html" class="topbar-brand"><div class="topbar-bars"><span></span><span></span><span></span><span></span><span></span></div>CRM360 SG</a><div class="topbar-search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" placeholder="Rechercher..." id="globalSearch"></div><div class="topbar-right"><div class="topbar-avatar">MC</div></div></header>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main fade-in" id="mainContent">
      <div class="page-header"><div><h1>Factures</h1><div class="page-header-sub" id="pageSubtitle"></div></div></div>
      <div class="kpi-row" id="invoiceKpis"></div>
      <div class="table-card">
        <div class="table-toolbar"><div class="table-toolbar-left"><h3>Toutes les factures</h3><span class="table-count" id="count"></span></div></div>
        <table>
          <thead><tr><th>N° Facture</th><th>Client</th><th>Commande</th><th>Montant</th><th>Date</th><th>Échéance</th><th>Statut</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="modal"><div class="modal"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="MickaCRM.ui.closeModal()">&times;</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/config.js"></script><script src="../js/ui.js"></script><script src="../js/nav.js"></script><script src="../js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      MickaCRM.nav.init('invoices');
      const D = MickaCRM.data.invoices;
      const { fmt, fmtDate, badge } = MickaCRM.ui;
      document.getElementById('pageSubtitle').textContent = D.length + ' factures';
      document.getElementById('count').textContent = D.length;

      const paid = D.filter(i => i.status === 'Payée').reduce((s, i) => s + i.amount, 0);
      const pending = D.filter(i => i.status === 'En attente').reduce((s, i) => s + i.amount, 0);
      const overdue = D.filter(i => i.status === 'En retard').reduce((s, i) => s + i.amount, 0);
      document.getElementById('invoiceKpis').innerHTML = `
        <div class="kpi-card green fade-in fade-in-delay-1"><div class="kpi-label">Payées</div><div class="kpi-value">${fmt(paid)}</div></div>
        <div class="kpi-card orange fade-in fade-in-delay-2"><div class="kpi-label">En attente</div><div class="kpi-value">${fmt(pending)}</div></div>
        <div class="kpi-card red fade-in fade-in-delay-3"><div class="kpi-label">En retard</div><div class="kpi-value">${fmt(overdue)}</div></div>
      `;

      document.getElementById('tableBody').innerHTML = D.map(i => `
        <tr>
          <td><span style="font-weight:600;color:var(--blue-imperial)">${i.number}</span></td>
          <td>${i.account}</td>
          <td>${i.order}</td>
          <td><span style="font-family:Outfit;font-weight:600">${fmt(i.amount)}</span></td>
          <td>${fmtDate(i.date)}</td>
          <td>${fmtDate(i.dueDate)}</td>
          <td>${badge(i.status)}</td>
        </tr>
      `).join('');
    });
  </script>
</body>
</html>
