<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micka CRM</title>

  <!-- ── Google Fonts ─────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />

  <!-- ── Firebase SDK (CDN compat) ────────────────────────────── -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- ── Styles (tokens → base → modules) ─────────────────────── -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/modules/auth.css" />
</head>
<body>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- APP SHELL (caché tant que non authentifié)                   -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <div id="app-shell" style="display:none">
    <aside id="sidebar">
      <nav id="sidebar-nav"></nav>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main id="main-area">
      <div class="mobile-topbar" id="mobile-topbar">
        <button class="mobile-hamburger" id="mobile-hamburger" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="mobile-topbar-logo">Micka<span class="sb-logo-360">CRM</span></span>
        <div style="width:36px"></div>
      </div>
      <div id="page-header"></div>
      <div id="page-content"></div>
    </main>
  </div>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- CHARGEMENT DES SCRIPTS — ordre strict                       -->
  <!--   1. Core (namespace EN PREMIER)                            -->
  <!--   2. Firebase init + CRUD                                   -->
  <!--   3. Config / data / objets                                 -->
  <!--   4. Modules UI                                             -->
  <!--   5. Modules métier                                         -->
  <!--   6. app.js (bootstrap) EN DERNIER                          -->
  <!-- ─────────────────────────────────────────────────────────── -->

  <!-- 1. Core -->
  <script src="js/core/namespace.js"></script>
  <script src="js/core/helpers.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/core/errors.js"></script>
  <script src="js/core/icons.js"></script>

  <!-- 2. Firebase -->
  <script src="js/firebase-init.js"></script>
  <script src="js/firebase-crud.js"></script>

  <!-- 3. Config / data / objets (modules historiques non encore migrés) -->
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/objects.js"></script>

  <!-- 4. UI / navigation -->
  <script src="js/nav.js"></script>
  <script src="js/ui.js"></script>

  <!-- 5. Modules métier -->
  <script src="js/list.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/pipeline.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/quote.js"></script>
  <script src="js/project360.js"></script>
  <script src="js/claim360.js"></script>
  <script src="js/activity360.js"></script>
  <script src="js/product-picker.js"></script>
  <script src="js/user360.js"></script>
  <script src="js/user-management.js"></script>
  <script src="js/agent-console.js"></script>
  <script src="js/agent-team.js"></script>
  <script src="js/record.js"></script>

  <!-- 6. Auth (module refactorisé Dwight-compliant) -->
  <script src="js/modules/auth/auth.js"></script>

  <!-- 7. Bootstrap — EN DERNIER -->
  <script src="js/app.js"></script>

</body>
</html>
