<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MickaCRM — CRM360 SG</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- TOPBAR -->
  <header class="topbar">
    <a href="index.html" class="topbar-brand">
      <img src="LogoSG.png" alt="CRM360 Saint-Gobain" class="topbar-logo">
    </a>
    <div class="topbar-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="Rechercher..." id="globalSearch">
    </div>
    <div class="topbar-right">
      <div class="topbar-avatar">MC</div>
    </div>
  </header>
  <div class="app-layout">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar"></nav>
    <!-- MAIN -->
    <main class="main fade-in" id="mainContent">
      <div class="page-header">
        <div>
          <h1>Dashboard</h1>
          <div class="page-header-sub">Vue d'ensemble CRM — Secteur Construction</div>
        </div>
      </div>
      <!-- KPIs -->
      <div class="kpi-row" id="dashKpis"></div>
      <!-- Widgets -->
      <div class="dash-grid">
        <div class="table-card fade-in fade-in-delay-2">
          <div class="table-toolbar"><div class="table-toolbar-left"><h3>Dernières Opportunités</h3></div></div>
          <table>
            <thead><tr><th>Affaire</th><th>Montant</th><th>Étape</th></tr></thead>
            <tbody id="dashOpps"></tbody>
          </table>
        </div>
        <div class="table-card fade-in fade-in-delay-3">
          <div class="table-toolbar"><div class="table-toolbar-left"><h3>Tickets Récents</h3></div></div>
          <table>
            <thead><tr><th>Sujet</th><th>Priorité</th><th>Statut</th></tr></thead>
            <tbody id="dashCases"></tbody>
          </table>
        </div>
      </div>
      <div class="dash-grid" style="margin-top:20px">
        <div class="table-card fade-in fade-in-delay-3">
          <div class="table-toolbar"><div class="table-toolbar-left"><h3>Projets en cours</h3></div></div>
          <table>
            <thead><tr><th>Chantier</th><th>Client</th><th>Avancement</th></tr></thead>
            <tbody id="dashProjects"></tbody>
          </table>
        </div>
        <div class="table-card fade-in fade-in-delay-4">
          <div class="table-toolbar"><div class="table-toolbar-left"><h3>Factures à suivre</h3></div></div>
          <table>
            <thead><tr><th>N°</th><th>Client</th><th>Montant</th><th>Statut</th></tr></thead>
            <tbody id="dashInvoices"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" onclick="MickaCRM.ui.closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>
  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>
  <!-- SCRIPTS -->
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <!-- Core -->
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/data.js"></script>
  <!-- Dashboard init -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      MickaCRM.nav.init('dashboard');
      MickaCRM.dashboard.init();
    });
  </script>
  <script src="js/dashboard.js"></script>
</body>
</html>
