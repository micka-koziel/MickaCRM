<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM360 · MickaCRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📊</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══════════ TOPBAR ═══════════ -->
  <div class="topbar">
    <div class="topbar-left">
      <!-- Logo -->
      <div class="logo" id="logo">
        <div class="logo-bars">
          <div class="logo-bar" style="height:10px;background:#0195D6"></div>
          <div class="logo-bar" style="height:13px;background:#4DB1B3"></div>
          <div class="logo-bar" style="height:16px;background:#E66407"></div>
          <div class="logo-bar" style="height:19px;background:#C5284C"></div>
        </div>
        <span class="logo-text">CRM<span>360</span></span>
      </div>

      <div class="topbar-sep"></div>

      <!-- Nav Pills -->
      <button class="topbar-pill active" id="nav-home">🏠 Accueil</button>
      <button class="topbar-pill" id="nav-pipeline">📊 Pipeline</button>

      <!-- Objects Dropdown -->
      <div style="position:relative">
        <button class="topbar-menu-btn" id="menu-btn">☰ <span class="arrow">▾</span></button>
        <div class="dropdown dropdown-left" id="menu-dropdown" style="display:none"></div>
      </div>
    </div>

    <div class="topbar-right">
      <!-- Search -->
      <div style="position:relative">
        <div class="search-wrapper closed" id="search-wrapper">
          <span class="search-icon" id="search-icon">🔍</span>
          <input class="search-input" id="search-input" placeholder="Rechercher..." style="display:none">
        </div>
        <div class="dropdown dropdown-search" id="search-results" style="display:none"></div>
      </div>

      <!-- Quick Create -->
      <div style="position:relative">
        <button class="btn-create" id="create-btn">+</button>
        <div class="dropdown dropdown-right" id="create-dropdown" style="display:none"></div>
      </div>

      <!-- Avatar -->
      <div class="avatar">M</div>
    </div>
  </div>

  <!-- ═══════════ BREADCRUMBS ═══════════ -->
  <div class="breadcrumbs" id="breadcrumbs"></div>

  <!-- ═══════════ PAGE HEADER ═══════════ -->
  <div class="page-header" id="page-header" style="display:none;padding:0 20px">
    <div class="page-header-left">
      <span class="page-header-icon" id="page-header-icon"></span>
      <h1 class="page-header-title" id="page-header-title"></h1>
    </div>
    <button class="btn-primary" id="page-header-new-btn" style="display:none"
      onclick="showToast('Création — bientôt disponible', 'info')">+ Nouveau</button>
  </div>

  <!-- ═══════════ MAIN CONTENT ═══════════ -->
  <div class="main-content anim-fade-slide" id="main-content"></div>

  <!-- ═══════════ SCRIPTS (order matters!) ═══════════ -->
  <!-- 1. Config & constants -->
  <script src="js/config.js"></script>
  <!-- 2. Mock data -->
  <script src="js/data.js"></script>
  <!-- 3. Object registry -->
  <script src="js/objects.js"></script>
  <!-- 4. UI components -->
  <script src="js/ui.js"></script>
  <!-- 5. Navigation & routing -->
  <script src="js/nav.js"></script>
  <!-- 6. Pages -->
  <script src="js/dashboard.js"></script>
  <script src="js/list.js"></script>
  <script src="js/record.js"></script>
  <script src="js/pipeline.js"></script>
  <!-- 7. App entry (must be last) -->
  <script src="js/app.js"></script>

</body>
</html>
