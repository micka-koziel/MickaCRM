<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MickaCRM</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />

  <!-- Firebase SDK (CDN compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- Firebase Init (must come right after SDKs) -->
  <script src="js/firebase-init.js"></script>

  <!-- MickaCRM Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── App Shell (flex container for sidebar + main) ────────────── -->
  <div id="app-shell">

    <!-- ── Sidebar ───────────────────────────────────────────────── -->
    <aside id="sidebar">
      <div id="sidebar-logo">
        <img src="assets/LogoSG.png" alt="Saint-Gobain" style="height:44px;" />
      </div>
      <nav id="sidebar-nav"></nav>
    </aside>

    <!-- ── Main Area ─────────────────────────────────────────────── -->
    <main id="main-area">
      <div id="page-header"></div>
      <div id="page-content"></div>
    </main>

  </div>

  <!-- ── MickaCRM Scripts (order matters) ────────────────────────── -->
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/objects.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/list.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/pipeline.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/quote.js"></script>
  <script src="js/project360.js"></script>
  <script src="js/claim360.js"></script>
  <script src="js/activity360.js"></script>
  <script src="js/record.js"></script>
  <script src="js/app.js"></script>

  <!-- ── AI Assistant (loads last, self-initializing) ────────────── -->
  <script src="js/ai-assistant.js"></script>

</body>
</html>
